<script>
const clientId="a3749a83bbd24534b2e709a795fcbae7";
const redirectUri="https://devxdave1.github.io/devxdave.com/";
const scopes="user-read-currently-playing user-read-playback-state";

function getToken(){
  const hash = window.location.hash;
  if(hash){
    return new URLSearchParams(hash.substring(1)).get("access_token");
  }
  return null; // HUWAG NA MAG REDIRECT
}

async function updateNowPlaying(token){
try{
const res=await fetch(
"https://api.spotify.com/v1/me/player/currently-playing",
{headers:{Authorization:"Bearer "+token}}
);

if(res.status===204||res.status>400){
document.getElementById("spotifyCard").style.display="none";
return;
}

const data=await res.json();

if(!data || !data.is_playing){
document.getElementById("spotifyCard").style.display="none";
return;
}

document.getElementById("spotifyCard").style.display="block";
document.getElementById("spotifyStatus").textContent="Listening to Spotify";

document.getElementById("title").textContent=data.item.name;
document.getElementById("artist").textContent=
data.item.artists.map(a=>a.name).join(", ");

document.getElementById("cover").src =
data.item.album.images[0].url;
document.getElementById("cover").style.display = "block";

const percent=(data.progress_ms/data.item.duration_ms)*100;
document.getElementById("progress").style.width=percent+"%";

function format(ms){
const totalSeconds=Math.floor(ms/1000);
const minutes=Math.floor(totalSeconds/60);
const seconds=totalSeconds%60;
return minutes+":"+(seconds<10?"0":"")+seconds;
}

document.getElementById("current").textContent=
format(data.progress_ms);

document.getElementById("duration").textContent=
format(data.item.duration_ms);

}catch(err){console.log(err);}
}

const token = getToken();

if(token){
  setInterval(()=>updateNowPlaying(token),3000);
}

if(!token){
  document.getElementById("spotifyCard").style.display="none";
    }

</script>

    card.style.display="block";
  }else{
    card.style.display="none";
  }
}

/* ===== NOW WATCHING WITH IMAGE ===== */

function setWatching(title, episode, imageUrl){

  const card = document.getElementById("watchingCard");
  const titleEl = document.getElementById("watchTitle");
  const episodeEl = document.getElementById("watchEpisode");
  const imageEl = document.getElementById("watchImage");

  if(title){

    titleEl.textContent = title;
    episodeEl.textContent = episode || "";

    if(imageUrl){
      imageEl.src = imageUrl;
      imageEl.style.display = "block";
    } else {
      imageEl.style.display = "none";
    }

    card.style.display = "block";
    
    startWatchTimer();

  } else {
    card.style.display = "none";
  }
}

/* ===== PERSISTENT 2 HOUR WATCH TIMER ===== */

let watchInterval;
const totalDuration = 60 * 60; // 1 hour
function startWatchTimer(){

  const progress = document.getElementById("watchProgress");
  const currentLabel = document.getElementById("watchCurrent");

  document.getElementById("watchTotal").textContent = "1:00:00";

  clearInterval(watchInterval);

  // Kunin saved time
  let savedTime = localStorage.getItem("watchTime");
  let currentTime = savedTime ? parseInt(savedTime) : 0;

  updateUI(currentTime);

  watchInterval = setInterval(()=>{

    currentTime++;

    if(currentTime >= totalDuration){
      currentTime = totalDuration;
      clearInterval(watchInterval);
    }

    localStorage.setItem("watchTime", currentTime);
    updateUI(currentTime);

  },1000);
}


function updateUI(currentTime){

  const progress = document.getElementById("watchProgress");
  const currentLabel = document.getElementById("watchCurrent");

  const percent = (currentTime / totalDuration) * 100;
  progress.style.width = percent + "%";

  const hours = Math.floor(currentTime / 3600);
  const minutes = Math.floor((currentTime % 3600) / 60);
  const seconds = currentTime % 60;

  if(hours > 0){
    currentLabel.textContent =
      hours + ":" +
      (minutes < 10 ? "0" : "") + minutes + ":" +
      (seconds < 10 ? "0" : "") + seconds;
  } else {
    currentLabel.textContent =
      minutes + ":" +
      (seconds < 10 ? "0" : "") + seconds;
  }
}

/* OPTIONAL: Reset kapag nag change ka ng episode */
function resetWatchTimer(){
  localStorage.removeItem("watchTime");
}

document.addEventListener("DOMContentLoaded", function(){

  setWatching("", "", "");

});
  

</script>

<script>
const myBooks = [
  {
    title: "The Myth of Sisyphus",
    author: "Albert Camus",
    cover: "sisyphus.jpg", 
    rating: 4.9,
    stars: "4.9/5"
  },
  {
    title: "The Stranger",
    author: "Albert Camus",
    cover: "the_stranger.jpg",
    rating: 4.9,
    stars: "4.9/5"
  },
  {
    title: "White Nights",
    author: "Fyodor Dostoevsky",
    cover: "white_night.jpg",
    rating: 4.5,
    stars: "4.5/5"
  },
  {
    title: "The Metamorphosis",
    author: "Franz Kafka",
    cover: "metamorphosis.jpg",
    rating: 4.5,
    stars: "4.5/5"
  },
  {
    title: "The Gay Science",
    author: "Friedrich Nietzsche",
    cover: "gay_science.jpg",
    rating: 4.7,
    stars: "4.7/5"
  },
  {
    title: "Bobby Fischer Teaches Chess",
    author: "Bobby Fischer",
    cover: "bobby_fischer.jpg",
    rating: 4.8,
    stars: "4.8/5"
  }
];

let currentBookIndex = 0;
let touchstartX = 0;
let touchendX = 0;

function updateBookDisplay(index) {
  const book = myBooks[index];
  const titleEl = document.getElementById("bookTitle");
  const authorEl = document.getElementById("bookAuthor");
  const coverEl = document.getElementById("bookCover");
  const ratingEl = document.getElementById("bookRating");

  // Smooth transition effect
  titleEl.style.opacity = 0;
  authorEl.style.opacity = 0;
  coverEl.style.opacity = 0;

  setTimeout(() => {
    titleEl.textContent = book.title;
    authorEl.textContent = book.author;
    coverEl.src = book.cover;
    
    // Star Rating Logic
    let starHtml = "";
    for(let i = 1; i <= 5; i++) {
      if(i <= Math.floor(book.rating)) {
        starHtml += '<i class="fas fa-star"></i> ';
      } else if(book.rating % 1 !== 0 && i === Math.ceil(book.rating)) {
        starHtml += '<i class="fas fa-star-half-alt"></i> ';
      } else {
        starHtml += '<i class="far fa-star"></i> ';
      }
    }
    starHtml += `<span style="color:white; opacity:0.6; font-size:10px; margin-left:4px;">${book.stars}</span>`;
    ratingEl.innerHTML = starHtml;

    // Fade back in
    titleEl.style.opacity = 1;
    authorEl.style.opacity = 0.6;
    coverEl.style.opacity = 1;
  }, 150);
}

function handleGesture() {
  if (touchendX < touchstartX - 50) {
    // Swipe Left - Next
    currentBookIndex = (currentBookIndex + 1) % myBooks.length;
    updateBookDisplay(currentBookIndex);
  }
  if (touchendX > touchstartX + 50) {
    // Swipe Right - Previous
    currentBookIndex = (currentBookIndex - 1 + myBooks.length) % myBooks.length;
    updateBookDisplay(currentBookIndex);
  }
}

const bookCard = document.getElementById('bookCard');
bookCard.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
bookCard.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleGesture(); });

// Load first book on start
document.addEventListener("DOMContentLoaded", () => updateBookDisplay(0));
</script>
